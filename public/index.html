<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudflare AI Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #212121;
    color: #ececec;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    width: 100%;
  }

  /* Header */
  .top-bar {
    height: 52px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #212121;
    border-bottom: 1px solid #2f2f2f;
  }
  .top-bar h1 {
    font-size: 15px;
    font-weight: 500;
    color: #ececec;
  }

  /* Chat area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .chat-inner {
    max-width: 768px;
    margin: 0 auto;
    padding: 0 16px;
    width: 100%;
  }

  #chat-messages {
    padding: 24px 0;
    display: flex;
    flex-direction: column;
  }

  .message {
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 24px;
    word-wrap: break-word;
    white-space: pre-wrap;
    color: #ececec;
  }

  .message.assistant-message {
    align-self: flex-start;
    width: 100%;
    padding: 0 40px 0 0;
    background: transparent;
    color: #d1d5db;
  }

  .message.user-message {
    align-self: flex-end;
    background: #2f2f2f;
    color: #ececec;
    padding: 10px 16px;
    border-radius: 18px;
    max-width: 70%;
    margin-left: auto;
  }

  /* Typing indicator */
  #typing-indicator {
    display: none;
    padding-bottom: 20px;
    color: #a0a0a0;
    align-items: center;
    gap: 8px;
  }
  #typing-indicator:not(.hidden) {
    display: flex;
  }
  .typing-dots {
    display: flex;
    gap: 4px;
  }
  .typing-dots span {
    width: 6px;
    height: 6px;
    background: #8e8ea0;
    border-radius: 50%;
    animation: bounce 1.3s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* Input */
  .input-wrapper {
    flex-shrink: 0;
    background: #212121;
    padding: 12px 0 14px;
  }
  .input-area {
    max-width: 768px;
    margin: 0 auto;
    padding: 0 16px;
  }
  .input-box {
    display: flex;
    align-items: flex-end;
    background: #2f2f2f;
    border: 1px solid #424242;
    border-radius: 24px;
    padding: 8px 8px 8px 14px;
  }
  .input-box:focus-within {
    border-color: #565656;
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #ececec;
    font-size: 15px;
    line-height: 22px;
    max-height: 160px;
    min-height: 24px;
    padding: 6px 4px;
    resize: none;
    font-family: inherit;
  }
  #user-input::placeholder {
    color: #8e8ea0;
  }

  #send-button {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    border: none;
    border-radius: 50%;
    background: #424242;
    color: #6e6e6e;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
    margin-left: 6px;
    transition: background 0.15s, color 0.15s;
  }
  #send-button:not(:disabled) {
    background: #10a37f;
    color: #ffffff;
    cursor: pointer;
  }
  #send-button:not(:disabled):hover {
    background: #0d8c6d;
  }
  #send-button:disabled {
    opacity: 0.6;
  }
  #send-button svg {
    width: 16px;
    height: 16px;
  }

  .footer {
    max-width: 768px;
    margin: 8px auto 0;
    padding: 0 16px;
    text-align: center;
    font-size: 12px;
    color: #8e8ea0;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #424242; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }

  @media (max-width: 768px) {
    .chat-inner { padding: 0 12px; }
    .input-area { padding: 0 12px; }
    #chat-messages { padding: 16px 0; }
    .message.user-message { max-width: 85%; padding: 9px 14px; border-radius: 16px; }
    .message.assistant-message { padding-right: 0; }
    .input-box { border-radius: 20px; }
    .top-bar { height: 48px; }
  }
</style>
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <h1>Cloudflare AI Chat</h1>
    </header>

    <main class="chat-container">
      <div class="chat-inner">
        <div id="chat-messages">
          <div class="message assistant-message">Hello! I'm your AI assistant powered by Cloudflare Workers AI. How can I help you today?</div>
        </div>
        <div id="typing-indicator" class="hidden">
          <div class="typing-dots"><span></span><span></span></div>
        </div>
      </div>
    </main>

    <div class="input-wrapper">
      <div class="input-area">
        <div class="input-box">
          <textarea id="user-input" placeholder="Message..." rows="1"></textarea>
          <button id="send-button" disabled aria-label="Send message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
      <div class="footer">Cloudflare AI Chat can make mistakes. Consider checking important information. <br>
      &copy; 2026 Cloudflare Workers Development</div>
    </div>
  </div>

  <script src="chat.js"></script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
